name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  posekit:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: PoseKit tests
        run: swift test --package-path PoseKit
  posekit-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Kotlin PoseKit tests + Android app build
        run: gradle -p android :posekit:test :app:assembleDebug
  app:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen
      - name: Build + test on simulator
        shell: bash
        run: |
          set -o pipefail
          xcodebuild test -project Pose.xcodeproj -scheme Pose \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO | tail -300
