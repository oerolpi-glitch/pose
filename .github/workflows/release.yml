name: TestFlight

# Manual trigger only — every run archives, signs, and uploads a build to
# TestFlight. Signing is cloud-managed: the App Store Connect API key lets
# xcodebuild create/download the distribution certificate and profile itself
# (-allowProvisioningUpdates), so no certificates are stored in this repo or
# its secrets. Setup steps: docs/RELEASE.md § "TestFlight from CI".
on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing version (CFBundleShortVersionString)"
        required: false
        default: "1.0"

jobs:
  upload:
    runs-on: macos-15
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MARKETING_VERSION: ${{ github.event.inputs.marketing_version || '1.0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are configured
        run: |
          missing=0
          for name in ASC_KEY_ID ASC_ISSUER_ID APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then echo "::error::Missing secret $name"; missing=1; fi
          done
          if [ -z "${{ secrets.ASC_PRIVATE_KEY }}" ]; then echo "::error::Missing secret ASC_PRIVATE_KEY"; missing=1; fi
          exit $missing

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen

      - name: Write App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$ASC_PRIVATE_KEY" > "$HOME/private_keys/AuthKey_$ASC_KEY_ID.p8"

      - name: Archive (Release, cloud signing)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Pose.xcodeproj -scheme Pose -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Pose.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_$ASC_KEY_ID.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" | tail -200

      - name: Upload to TestFlight
        run: |
          set -o pipefail
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/Pose.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_$ASC_KEY_ID.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" | tail -100
